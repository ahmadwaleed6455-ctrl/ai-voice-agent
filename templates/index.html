<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRH Rahbar - AI Assistant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    
    <style>
        .chat-container { height: calc(100vh - 400px); }
        .bg-lrh { background-color: #002d62; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #video-container video { transform: scaleX(-1); border-radius: 50%; border: 5px solid #002d62; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="bg-gray-50 font-sans flex flex-col min-h-screen">

    <header class="bg-lrh text-white px-4 py-3 shadow-lg flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <img src="/static/img/lrh_official_logo.png" alt="LRH" class="h-10 bg-white p-1 rounded-lg">
            <div>
                <h1 class="text-lg font-bold leading-tight">LRH Digital Rehbar</h1>
                <p class="text-[10px] text-blue-200 uppercase tracking-wider">AI Assistant</p>
            </div>
        </div>
        
        <div class="flex items-center space-x-4">
            <span class="text-sm font-medium hidden md:block">
                <i class="fas fa-user-circle mr-1"></i> {{ name }} 
                <span class="text-[10px] bg-blue-800 px-2 py-0.5 rounded-full ml-1">{{ role | upper }}</span>
            </span>
            
            {% if role == 'guest' %}
                <a href="/auth" class="bg-green-500 hover:bg-green-600 px-4 py-1.5 rounded-full text-sm font-bold shadow transition">
                    <i class="fas fa-sign-in-alt mr-1"></i> Login
                </a>
            {% else %}
                {% if role == 'admin' %}
                    <a href="/admin" class="bg-yellow-500 hover:bg-yellow-600 text-[#002d62] px-4 py-1.5 rounded-full text-sm font-bold shadow transition hidden sm:block">
                        <i class="fas fa-shield-alt mr-1"></i> Admin Panel
                    </a>
                {% endif %}
                <a href="/logout" class="bg-red-500 hover:bg-red-600 px-4 py-1.5 rounded-full text-sm font-bold shadow transition">
                    <i class="fas fa-sign-out-alt mr-1"></i> Logout
                </a>
            {% endif %}
        </div>
    </header>

    <main class="flex-1 container mx-auto max-w-md p-4 flex flex-col relative">
        
        <div class="absolute inset-0 flex items-center justify-center opacity-5 pointer-events-none z-0">
            <img src="/static/img/rehbar_icon.png" alt="Watermark" class="w-64 h-64 grayscale">
        </div>

        <div id="video-container" class="flex justify-center mb-6 min-h-[220px] items-center relative z-10 mt-4">
            <div class="w-48 h-48 rounded-full bg-white border-4 border-dashed border-gray-300 flex items-center justify-center text-gray-400 shadow-sm overflow-hidden relative">
                <img src="/static/img/rehbar_icon.png" class="w-24 h-24 opacity-50 absolute">
                <i class="fas fa-microphone-alt text-6xl relative z-10"></i>
            </div>
        </div>

        <div id="chat-box" class="chat-container overflow-y-auto bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm p-4 mb-4 space-y-4 border border-gray-100 relative z-10">
            <div class="flex justify-start">
                <div class="bg-gray-100 text-gray-800 p-3.5 rounded-2xl rounded-tl-sm max-w-[85%] shadow-sm border border-gray-200">
                    <p class="font-bold text-xs text-[#002d62] mb-1"><i class="fas fa-robot mr-1"></i> LRH Rehbar</p>
                    میں ہوں آپ کے ایل آر ایچ کا ڈیجیٹل رہبر {% if role == 'guest' %} (Guest Mode: 10 Messages allowed) {% endif %}
                </div>
            </div>
        </div>

        <div class="flex space-x-2 items-center bg-white p-2 rounded-full shadow-lg border border-gray-200 relative z-10 mt-auto">
            <input type="text" id="user-input" placeholder="Type your message here..." class="flex-1 outline-none px-4 py-2 bg-transparent text-sm">
            
            <button id="voice-btn" class="bg-[#002d62] hover:bg-blue-900 text-white w-10 h-10 rounded-full flex items-center justify-center transition-all shadow-md">
                <i class="fas fa-phone-alt"></i>
            </button>

            <button id="send-btn" class="bg-green-600 hover:bg-green-700 text-white w-10 h-10 rounded-full flex items-center justify-center transition-all shadow-md">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </main>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const voiceBtn = document.getElementById('voice-btn');
        const videoContainer = document.getElementById('video-container');
        let currentRoom = null;

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="${isUser ? 'bg-[#002d62] text-white rounded-tr-sm' : 'bg-gray-100 text-gray-800 rounded-tl-sm'} p-3.5 rounded-2xl max-w-[85%] shadow-sm animate-fade-in border ${isUser ? 'border-[#002d62]' : 'border-gray-200'}">
                    ${!isUser ? '<p class="font-bold text-xs text-[#002d62] mb-1"><i class="fas fa-robot mr-1"></i> LRH Rehbar</p>' : ''}
                    ${text}
                </div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        sendBtn.onclick = async () => {
            const msg = userInput.value.trim();
            if (!msg) return;
            addMessage(msg, true);
            userInput.value = '';
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await response.json();
                addMessage(data.reply, false);
            } catch (error) {
                addMessage("Error: Server connection failed.", false);
            }
        };

        voiceBtn.onclick = async () => {
            if (currentRoom) {
                await currentRoom.disconnect();
                currentRoom = null;
                voiceBtn.innerHTML = '<i class="fas fa-phone-alt"></i>';
                voiceBtn.classList.replace('bg-red-600', 'bg-[#002d62]');
                videoContainer.innerHTML = '<div class="w-48 h-48 rounded-full bg-white border-4 border-dashed border-gray-300 flex items-center justify-center text-gray-400 shadow-sm relative"><img src="/static/img/rehbar_icon.png" class="w-24 h-24 opacity-50 absolute"><i class="fas fa-microphone-alt text-6xl relative z-10"></i></div>';
                addMessage("Call ended.", false);
                return;
            }

            voiceBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const res = await fetch('/get_voice_token');
                if (!res.ok) throw new Error("Voice Server Error");
                const data = await res.json();
                
                const room = new LivekitClient.Room();
                await room.connect(data.url, data.token);
                currentRoom = room;
                
                await room.prepareConnection();
                await room.startAudio();
                await room.localParticipant.setMicrophoneEnabled(true);
                
                room.on('trackSubscribed', (track) => {
                    if (track.kind === 'audio') {
                        const audioElement = track.attach();
                        document.body.appendChild(audioElement);
                        audioElement.play().catch(e => console.error(e));
                    } 
                    else if (track.kind === 'video') {
                        const videoElement = track.attach();
                        videoElement.style.width = "192px";
                        videoElement.style.height = "192px";
                        videoContainer.innerHTML = ''; 
                        videoContainer.appendChild(videoElement);
                    }
                });

                room.on('transcriptionReceived', (transcriptions, participant) => {
                    transcriptions.forEach(t => {
                        if(t.isFinal) addMessage(t.text, participant === room.localParticipant);
                    });
                });

                voiceBtn.innerHTML = '<i class="fas fa-phone-slash"></i>';
                voiceBtn.classList.replace('bg-[#002d62]', 'bg-red-600');
                addMessage("Call connected. You have limited time based on your role.", false);
                document.body.click();

                // Auto-disconnect based on timeout limits received from backend
                setTimeout(async () => {
                    if (currentRoom) {
                        await currentRoom.disconnect();
                        addMessage("🛑 Call Limit Reached. Call disconnected automatically.", false);
                        voiceBtn.click(); // Reset UI
                    }
                }, data.timeout * 1000);

            } catch (error) {
                alert("Call Setup Failed: " + error.message);
                voiceBtn.innerHTML = '<i class="fas fa-phone-alt"></i>';
            }
        };

        userInput.onkeypress = (e) => { if (e.key === 'Enter') sendBtn.click(); };
    </script>
</body>
</html>
